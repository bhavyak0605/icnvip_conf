<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chief Patrons | ICNVIP-2027</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="header-placeholder"></header>



  <main class="container section main-layout-gap-4">
    <!-- Our Inspiration -->
    <section class="fade-up">
      <div class="section-header section-header-left">
        <h3>Our Inspiration</h3>
      </div>
      <div class="committee-grid" id="patrons-inspiration-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Chief Patrons -->
    <section class="fade-up">
      <div class="section-header section-header-left">
        <h3>Chief Patrons</h3>
      </div>
      <div class="committee-grid" id="patrons-chief-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Organizing Committee Section inside Patrons Page -->
    <div id="committee-sections">
      <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 4rem 0;">

      <!-- General Chairs -->
      <section class="fade-up">
        <div class="section-header section-header-left">
          <h3>General Chairs</h3>
        </div>
        <div class="committee-grid" id="committee-general-grid">
          <!-- Rendered by main.js -->
        </div>
      </section>

      <!-- General Co-Chairs -->
      <section class="fade-up">
        <div class="section-header section-header-left">
          <h3>General Co-Chairs</h3>
        </div>
        <div class="committee-grid" id="committee-generalco-grid">
          <!-- Rendered by main.js -->
        </div>
      </section>

      <!-- Conference Chair -->
      <section class="fade-up">
        <div class="section-header section-header-left">
          <h3>Conference Chair</h3>
        </div>
        <div class="committee-grid" id="committee-conference-grid">
          <!-- Rendered by main.js -->
        </div>
      </section>

      <!-- Organizing Chairs -->
      <section class="fade-up">
        <div class="section-header section-header-left">
          <h3>Organizing Chairs</h3>
        </div>
        <div class="committee-grid" id="committee-organizing-grid">
          <!-- Rendered by main.js -->
        </div>
      </section>

      <!-- Detailed Functional Committee grids (Finance, Pub, Pub, Web) -->
      <section class="fade-up">
        <div class="section-header section-header-left">
          <h3>Steering & Functional Chairs</h3>
        </div>
        <div class="grid-4">
          <!-- Finance Chair -->
          <div>
            <h4 class="text-muted functional-chair-title">Finance Chair</h4>
            <div id="committee-finance-grid"></div>
          </div>
          <!-- Publication Chair -->
          <div>
            <h4 class="text-muted functional-chair-title">Publication Chair</h4>
            <div id="committee-publication-grid"></div>
          </div>
          <!-- Publicity Chair -->
          <div>
            <h4 class="text-muted functional-chair-title">Publicity Chair</h4>
            <div id="committee-publicity-grid"></div>
          </div>
          <!-- Web Chair -->
          <div>
            <h4 class="text-muted functional-chair-title">Web Chair</h4>
            <div id="committee-web-grid"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
