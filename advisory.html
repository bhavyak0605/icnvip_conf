<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advisory Board | ICNVIP-2027</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="header-placeholder"></header>

  <div id="hero-banner-placeholder" 
       data-title="Advisory Board" 
       data-subtitle="The panels of international scholars and national mentors guiding paper selection processes for ICNVIP-2027.">
  </div>

  <main class="container section" style="display: flex; flex-direction: column; gap: 4rem;">
    <!-- International Advisory Board -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">International Advisory Board</h3>
      </div>
      <div class="grid-3" id="advisory-international-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- National Advisory Board -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">National Advisory Board</h3>
      </div>
      <div class="grid-3" id="advisory-national-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Technical Program Committee -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">Technical Program Committee</h3>
      </div>
      <div class="grid-3" id="advisory-technical-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
