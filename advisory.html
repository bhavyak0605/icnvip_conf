<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Program Committee | ICNVIP-2027</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="header-placeholder"></header>

  <main class="container section main-layout-gap-4">

    <section class="fade-up" id="international">

    <!-- National Advisory Board -->

      <div class="section-header section-header-left">
        <h3>National Advisory Board</h3>
      </div>
      <div class="grid-3" id="advisory-national-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="js/data.js"></script>
