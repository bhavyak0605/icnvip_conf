<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizing Committee | ICNVIP-2027</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="header-placeholder"></header>

  <div id="hero-banner-placeholder" 
       data-title="Organizing Committee" 
       data-subtitle="The steering leads, general chairs, and committee executives coordinating the technical programs of ICNVIP-2027.">
  </div>

  <main class="container section" style="display: flex; flex-direction: column; gap: 4rem;">
    <!-- Honorary Chair -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">Honorary Chair</h3>
      </div>
      <div class="grid-4" id="committee-honorary-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- General Chairs -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">General Chairs</h3>
      </div>
      <div class="grid-4" id="committee-general-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Conference Chair -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">Conference Chair</h3>
      </div>
      <div class="grid-4" id="committee-conference-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Organizing Chairs -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">Organizing Chairs</h3>
      </div>
      <div class="grid-4" id="committee-organizing-grid">
        <!-- Rendered by main.js -->
      </div>
    </section>

    <!-- Detailed Functional Committee grids (Finance, Pub, Pub, Web) -->
    <section class="fade-up">
      <div class="section-header" style="margin-bottom: 2.5rem; text-align: left;">
        <h3 style="font-weight: 800; border-left: 4px solid var(--secondary); padding-left: 0.75rem;">Steering & Functional Chairs</h3>
      </div>
      <div class="grid-4">
        <!-- Finance Chair -->
        <div>
          <h4 class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 1.5rem; tracking-wider: 0.05em;">Finance Chair</h4>
          <div id="committee-finance-grid"></div>
        </div>
        <!-- Publication Chair -->
        <div>
          <h4 class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 1.5rem; tracking-wider: 0.05em;">Publication Chair</h4>
          <div id="committee-publication-grid"></div>
        </div>
        <!-- Publicity Chair -->
        <div>
          <h4 class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 1.5rem; tracking-wider: 0.05em;">Publicity Chair</h4>
          <div id="committee-publicity-grid"></div>
        </div>
        <!-- Web Chair -->
        <div>
          <h4 class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 1.5rem; tracking-wider: 0.05em;">Web Chair</h4>
          <div id="committee-web-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
